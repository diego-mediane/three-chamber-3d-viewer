<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three-Chamber 3D Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
    }
    h1 {
      text-align: center;
      margin: 20px 0 10px 0;
      font-size: 24px;
    }
    p {
      text-align: center;
      margin: 0 20px 20px 20px;
      font-size: 14px;
    }
    model-viewer {
      width: 100%;
      height: 85vh;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <h1>Three-Chamber Mouse Apparatus</h1>
  <p>Interactive 3D model viewer</p>

  <model-viewer
    src="./assembled.glb"
    alt="3D model of the three-chamber mouse apparatus fully assembled"
    camera-controls
    touch-action="pan-y"
    auto-rotate>
  </model-viewer>
</body>
</html>
