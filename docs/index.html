<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three-Chamber 3D Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    p {
      text-align: center;
      margin: 0 0 20px 0;
      font-size: 14px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    label {
      font-size: 14px;
    }

    select {
      font-size: 14px;
      padding: 8px 10px;
    }

    model-viewer {
      width: 100%;
      height: 78vh;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Three-Chamber Mouse Apparatus</h1>
    <p>Interactive 3D model viewer</p>

    <div class="controls">
      <label for="modelSelect">Choose model:</label>
      <select id="modelSelect">
        <option value="./assembled.glb">Assembled model</option>
        <option value="./slots_view.glb">Slots view</option>
      </select>
    </div>

    <model-viewer
      id="viewer"
      src="./assembled.glb"
      alt="3D model of the three-chamber mouse apparatus"
      camera-controls
      touch-action="pan-y"
      auto-rotate>
    </model-viewer>
  </div>

  <script>
    const select = document.getElementById('modelSelect');
    const viewer = document.getElementById('viewer');

    select.addEventListener('change', () => {
      viewer.src = select.value;
    });
  </script>
</body>
</html>
